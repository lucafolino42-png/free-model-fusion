version: '3.8'

services:
  fusion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: free-model-fusion
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=file:./data/fusion.db
      - FUSION_SECRET_KEY=${FUSION_SECRET_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY:-}
      - NOVITA_API_KEY=${NOVITA_API_KEY:-}
      - HYPERBOLIC_API_KEY=${HYPERBOLIC_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - NEBIUS_API_KEY=${NEBIUS_API_KEY:-}
      - FUSION_DEFAULT_PROFILE=${FUSION_DEFAULT_PROFILE:-balanced}
      - FUSION_MAX_EXPERTS=${FUSION_MAX_EXPERTS:-4}
    volumes:
      - fusion_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  fusion_data:
